<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click to start video</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

/* hidden at first */
video {
    position: fixed;
    inset: 0;
    width: 100dvw;
    height: 100dvh;
    object-fit: cover;
    background: black;

    display: none;
}

#overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: black;
    color: white;
    font-family: system-ui, sans-serif;
    font-size: 1.4rem;
    cursor: pointer;
    user-select: none;
    text-align: center;
}
</style>
</head>
<body>

<video id="video" loop playsinline preload="auto">
    <source src="https://i.makeagif.com/media/3-03-2026/7pFdUR.mp4" type="video/mp4">
</video>

<div id="overlay">Tap to start ▶️</div>

<script>
const video = document.getElementById("video");
const overlay = document.getElementById("overlay");

function startVideo() {
    // reveal the video
    video.style.display = "block";

    // enable sound
    video.muted = false;

    // start playback
    video.play();

    // remove overlay
    overlay.style.display = "none";

    overlay.removeEventListener("click", startVideo);
    overlay.removeEventListener("touchstart", startVideo);
}

overlay.addEventListener("click", startVideo);
overlay.addEventListener("touchstart", startVideo);
</script>

</body>
</html>
