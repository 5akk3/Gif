<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen Video</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
}

video {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
}

/* tap overlay */
#overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: sans-serif;
    font-size: 1.3rem;
    background: rgba(0,0,0,0.45);
    cursor: pointer;
}
</style>
</head>
<body>

<video id="vid" loop playsinline preload="auto">
    <source src="https://i.makeagif.com/media/3-03-2026/7pFdUR.mp4" type="video/mp4">
</video>

<div id="overlay">Tap to enable sound 🔊</div>

<script>
const video = document.getElementById("vid");
const overlay = document.getElementById("overlay");

// try to autoplay WITH sound
video.muted = false;

video.play().then(() => {
    // autoplay with sound worked (rare, but possible on desktop)
    overlay.style.display = "none";
}).catch(() => {
    // autoplay blocked – wait for user tap
});

overlay.addEventListener("click", () => {
    video.muted = false;
    video.play();
    overlay.style.display = "none";
});
</script>

</body>
</html>
