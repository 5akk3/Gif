<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen Video</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

video {
    position: fixed;
    inset: 0;

    width: 100dvw;
    height: 100dvh;

    object-fit: cover;
    background: black;
}

#overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.45);
    color: white;
    font-family: system-ui, sans-serif;
    font-size: 1.4rem;
    cursor: pointer;
    user-select: none;
}
</style>
</head>
<body>

<video id="video" loop playsinline preload="auto">
    <source src="https://i.makeagif.com/media/3-03-2026/7pFdUR.mp4" type="video/mp4">
</video>

<div id="overlay">Tap to enable sound 🔊</div>

<script>
const video = document.getElementById("video");
const overlay = document.getElementById("overlay");

// try to start immediately (may be blocked with sound)
video.muted = false;

video.play().then(() => {
    overlay.style.display = "none";
}).catch(() => {
    // waiting for user interaction
});

overlay.addEventListener("click", () => {
    video.muted = false;
    video.play();
    overlay.style.display = "none";
});
</script>

</body>
</html>
